name: ingestion
version: "1.0.0"
config-version: 2

profile: ingestion

model-paths:
  - identity
  - ../silver
  - ../connectors

macro-paths:
  - macros

clean-targets:
  - target
  - dbt_packages

# on-run-start hooks:
#  - create_task_field_history_staging:
#      DDL for `staging.jira__task_field_history` (Rust-owned table, ADR-003).
#      The Rust `jira-enrich` binary has INSERT rights only; dbt owns DDL.
#
# Bronze MergeTree → ReplacingMergeTree promotion happens per-connector via
# a dedicated bootstrap model (e.g. `jira__bronze_promoted`) using `pre_hook`,
# so all the connector's other models depend on it via `-- depends_on:`. This
# keeps connector-specific table lists co-located with the connector code.
on-run-start:
  - "{{ create_task_field_history_staging() }}"

# ---------------------------------------------------------------------------
# Bronze freshness SLA (single source of truth).
#
# Every Airbyte-managed bronze source automatically inherits this policy:
#   - `_airbyte_extracted_at` is set per-row by Airbyte's ClickHouse
#     destination on every sync — MAX(extracted_at) tracks "did the last
#     sync produce any rows?".
#   - All connectors run on a daily cron (02:00–11:00 UTC). 30h warn / 48h
#     error gives ~6h grace past the next expected run before paging.
#
# Connectors do NOT need to repeat these blocks in their own `schema.yml`.
# Per-table opt-outs (`freshness: null`) belong in `schema.yml` next to the
# table — those are domain decisions for slow-moving catalog/lookup streams.
# Faster cadences (sub-daily) override at the source level in `schema.yml`.
#
# Run via: `dbt source freshness --profiles-dir . --select source:bronze_*`.
# Triggered by the `dbt-source-freshness-check` CronWorkflow.
# ---------------------------------------------------------------------------
sources:
  ingestion:
    +loaded_at_field: _airbyte_extracted_at
    +freshness:
      warn_after: { count: 30, period: hour }
      error_after: { count: 48, period: hour }
