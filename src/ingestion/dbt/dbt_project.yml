name: ingestion
version: "1.0.0"
config-version: 2

profile: ingestion

model-paths:
  - identity
  - ../silver
  - ../connectors

macro-paths:
  - macros

clean-targets:
  - target
  - dbt_packages

# on-run-start hooks:
#  - create_task_field_history_staging:
#      DDL for `staging.jira__task_field_history` (Rust-owned table, ADR-003).
#      The Rust `jira-enrich` binary has INSERT rights only; dbt owns DDL.
#
# Bronze MergeTree → ReplacingMergeTree promotion happens per-connector via
# a dedicated bootstrap model (e.g. `jira__bronze_promoted`) using `pre_hook`,
# so all the connector's other models depend on it via `-- depends_on:`. This
# keeps connector-specific table lists co-located with the connector code.
on-run-start:
  - "{{ create_task_field_history_staging() }}"

# ---------------------------------------------------------------------------
# Bronze freshness SLA — thresholds (Helm-tunable).
#
# Defaults below are baseline values used when `dbt source freshness` runs
# without `--vars`. The freshness CronWorkflow (rendered from
# `charts/insight/templates/ingestion/dbt-source-freshness.yaml`) overrides
# them via `--vars` constructed from `ingestion.freshness.thresholds.*` in
# Helm values, so ops can tune SLA per environment without editing this file.
#
# Two threshold tiers:
#   - default — daily-cadence sources (most connectors). 30h/48h gives ~6h
#     grace past the next expected run.
#   - event — connectors whose business activity has natural quiet days
#     (Confluence edits, Zoom meetings, etc.). 72h/96h absorbs long
#     weekends and short holidays without sacrificing real-stop detection.
#
# `loaded_at_field` is a property (not a config) and dbt does not propagate
# it from project level. Each bronze source declares its own
# `loaded_at_field` at source level in its connector `schema.yml`.
# Streaming sources anchor on `_airbyte_extracted_at`; report-style
# sources (M365 Graph reports, Slack analytics, Cursor daily_usage,
# Confluence wiki_page_versions, Zoom meetings/participants) anchor on
# their own business-date column wrapped in `parseDateTimeBestEffortOrNull(...)`
# because Airbyte re-fetches their windows nightly and `_airbyte_extracted_at`
# stays green even when the upstream has stopped publishing new days.
#
# Per-table opt-outs (`freshness: null`) belong next to the table in
# connector `schema.yml` — domain decisions for catalog / roster streams.
#
# Run via: `dbt source freshness --profiles-dir . --select source:bronze_*`.
# ---------------------------------------------------------------------------
sources:
  ingestion:
    +freshness:
      # Helm-tunable thresholds. The freshness CronWorkflow exports
      # `FRESHNESS_*_H` from `ingestion.freshness.thresholds.*` in values.
      # Local `dbt source freshness` runs without those env vars get the
      # defaults below (`env_var('NAME', 'default')`). Source-level `vars:`
      # are not honored by source freshness in dbt 1.11, hence env_var.
      warn_after:  { count: "{{ env_var('FRESHNESS_WARN_DEFAULT_H',  '30') | int }}", period: hour }
      error_after: { count: "{{ env_var('FRESHNESS_ERROR_DEFAULT_H', '48') | int }}", period: hour }
