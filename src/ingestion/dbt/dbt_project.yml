name: ingestion
version: "1.0.0"
config-version: 2

profile: ingestion

model-paths:
  - identity
  - ../silver
  - ../connectors

macro-paths:
  - macros

clean-targets:
  - target
  - dbt_packages

# on-run-start hooks:
#  - create_task_field_history_staging:
#      DDL for `staging.jira__task_field_history` (Rust-owned table, ADR-003).
#      The Rust `jira-enrich` binary has INSERT rights only; dbt owns DDL.
#
# Bronze MergeTree → ReplacingMergeTree promotion happens per-connector via
# a dedicated bootstrap model (e.g. `jira__bronze_promoted`) using `pre_hook`,
# so all the connector's other models depend on it via `-- depends_on:`. This
# keeps connector-specific table lists co-located with the connector code.
on-run-start:
  - "{{ create_task_field_history_staging() }}"

# Project-wide pre_hook: drop init.sh-created silver placeholders (if
# marker + zero rows) before the incremental materialization rebuilds
# the table with the real model schema. Bridges the placeholder
# convention from ADR-0007.
#
# The hook is safe to apply to every model: `drop_placeholder_if_present`
# is a no-op for any table whose system.tables row does not match the
# `INSIGHT_PLACEHOLDER_v1` comment + 0 rows signature, which is true
# for every non-silver-placeholder table (bronze/staging models, real
# silver tables that already have data, etc.). See
# src/ingestion/dbt/macros/drop_placeholder_if_present.sql for the
# detection logic and removal plan.
models:
  ingestion:
    +pre-hook:
      - "{{ drop_placeholder_if_present(this) }}"
