version: 2

sources:
  - name: bronze_m365
    schema: bronze_m365
    # Microsoft Graph reports endpoints are *report-style* — Airbyte runs
    # daily and re-fetches yesterday's snapshot regardless of whether the
    # upstream report has actually advanced. `_airbyte_extracted_at` would
    # therefore always look fresh even if Microsoft hasn't published a new
    # day in 4 days. Anchor freshness on `reportRefreshDate` (the business
    # day the row describes) instead. ISO-8601 strings sort lexically.
    loaded_at_field: parseDateTimeBestEffortOrNull(reportRefreshDate)
    # Threshold uses the "report" tier (48h warn / 96h error by default,
    # Helm-tunable). Microsoft documents Graph usage-report publish lag
    # at 24-48h. Warn at 48h fires the moment the lag reaches the upper
    # edge of stated normal — so widening latency surfaces immediately
    # rather than getting buried under a generous threshold. 96h error
    # is past the documented baseline by a wide margin, reserving paging
    # for genuine outages.
    freshness:
      warn_after:  { count: "{{ env_var('FRESHNESS_WARN_REPORT_H',  '48') | int }}", period: hour }
      error_after: { count: "{{ env_var('FRESHNESS_ERROR_REPORT_H', '96') | int }}", period: hour }
    tables:
      - name: email_activity
      - name: teams_activity
      - name: onedrive_activity
      - name: sharepoint_activity

models:
  - name: m365__collab_chat_activity
    description: "M365 Teams chat activity → staging, feeds class_collab_chat_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null

  - name: m365__collab_meeting_activity
    description: "M365 Teams meeting activity → staging, feeds class_collab_meeting_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null

  - name: m365__collab_email_activity
    description: "M365 Outlook email activity → staging, feeds class_collab_email_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
