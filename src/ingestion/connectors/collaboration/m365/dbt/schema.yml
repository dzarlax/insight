              values: ['onedrive']

  - name: m365__collab_document_activity_sharepoint
    description: "M365 SharePoint document activity → staging, unioned into class_collab_document_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: product
        tests:
