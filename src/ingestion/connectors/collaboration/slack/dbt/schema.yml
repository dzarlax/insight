version: 2

sources:
  - name: bronze_slack
    schema: bronze_slack
    # Slack admin.analytics.getFile?type=member is *report-style* — Airbyte
    # re-fetches the same daily window every run, so `_airbyte_extracted_at`
    # advances even when Slack stops publishing new days (token rotated,
    # date logic broken, etc.). Anchor freshness on the report's own `date`
    # column (the business day the per-user analytics row describes).
    loaded_at_field: parseDateTimeBestEffortOrNull(date)
    # Threshold uses the "report_extended" tier (72h warn / 120h error by
    # default, Helm-tunable). Slack admin analytics is documented and
    # observed to lag ~3 days, with stretches up to 5 days during Slack-
    # side maintenance. Warn at 72h fires at the upper edge of typical
    # so we hear about widening lag immediately; 120h error reserves
    # paging for past-maintenance outages.
    freshness:
      warn_after:  { count: "{{ env_var('FRESHNESS_WARN_REPORT_EXTENDED_H',  '72')  | int }}", period: hour }
      error_after: { count: "{{ env_var('FRESHNESS_ERROR_REPORT_EXTENDED_H', '120') | int }}", period: hour }
    tables:
      - name: users_details

models:
  - name: slack__users_latest
    description: "Latest analytics snapshot per Slack user (tenant_id, source_id, user_id). Email is kept as a tracked attribute so downstream SCD2 records email changes instead of creating new entities."
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: email
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique

  - name: slack__users_snapshot
    description: "Slack users SCD2 snapshot — tracks email, is_guest, is_billable_seat changes over time."
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null

  - name: slack__users_fields_history
    description: "Slack users field-level change history (email, is_guest, is_billable_seat)."
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null

  - name: slack__collab_chat_activity
    description: "Slack daily chat activity per user (admin.analytics.getFile). Feeds silver.class_collab_chat_activity."
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: data_source
        tests:
          - not_null
