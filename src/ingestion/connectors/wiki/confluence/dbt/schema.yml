version: 2

sources:
  - name: bronze_confluence
    schema: bronze_confluence
    # Confluence connector re-fetches every page version on each run, so old
    # rows get a fresh `_airbyte_extracted_at` even when no new edits land —
    # anchoring on extracted-at would silently mask an upstream stop.
    # `wiki_page_versions` therefore anchors on its own `created_at` (the
    # version's edit timestamp).
    #
    # Threshold uses the "event" tier (`freshness_warn_event_h` /
    # `freshness_error_event_h` — 72h / 96h by default, Helm-tunable):
    # edits are event-style and a quiet team can legitimately have zero new
    # versions across a long weekend. The wider window absorbs Monday-
    # morning false positives while still catching a real 4-day stop.
    loaded_at_field: _airbyte_extracted_at
    freshness:
      warn_after:  { count: "{{ env_var('FRESHNESS_WARN_EVENT_H',  '72') | int }}", period: hour }
      error_after: { count: "{{ env_var('FRESHNESS_ERROR_EVENT_H', '96') | int }}", period: hour }
    tables:
      - name: wiki_spaces
        freshness: null
        meta:
          freshness_optout_reason: "roster — spaces created/archived rarely"
      - name: wiki_pages
        freshness: null
        meta:
          freshness_optout_reason: "roster — page lifecycle, not a daily activity signal (edits go through wiki_page_versions)"
      - name: wiki_page_versions
        loaded_at_field: parseDateTime64BestEffortOrNull(created_at, 3)

  # bronze_jira.jira_user is declared by the Jira connector
  # (connectors/task-tracking/jira/dbt/schema.yml). Staging models below
  # reference it via source('bronze_jira', 'jira_user') for author email
  # resolution, guarded with adapter.get_relation() so dbt still compiles
  # if Jira is not provisioned for the tenant.

models:
  - name: confluence__wiki_pages
    description: >
      Bronze → Silver step 1: Confluence pages → class_wiki_pages. One row
      per (tenant, source, page) with space/author/editor dimensions and
      version count. author_email / last_editor_email resolved via LEFT JOIN
      with bronze_jira.jira_user on accountId (NULL fallback when Jira is
      not provisioned).
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: page_id
        tests:
          - not_null
      - name: version_count
        tests:
          - not_null
      - name: source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['confluence']
      - name: data_source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['insight_confluence']

  - name: confluence__wiki_activity
    description: >
      Bronze → Silver step 1: Confluence page versions → class_wiki_activity.
      Per-user per-day edit activity with counts of pages_edited, total_edits,
      pages_created, major_edits, minor_edits. author_email resolved via
      bronze_jira.jira_user JOIN with NULL fallback.
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: author_id
        tests:
          - not_null
      - name: day
        tests:
          - not_null
      - name: pages_edited
        tests:
          - not_null
      - name: total_edits
        tests:
          - not_null
      - name: pages_created
        tests:
          - not_null
      - name: major_edits
        tests:
          - not_null
      - name: minor_edits
        tests:
          - not_null
      - name: source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['confluence']
      - name: data_source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['insight_confluence']
